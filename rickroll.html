<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatiable" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Secret Sidequest</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>


    <div id="videoContainer" style="display:none; margin-top:20px;">

        <h2 id="prankText" style="color: #7d2ae8; margin-bottom: 10px;">Get Pranked! 😂</h2>
        <iframe width="560" height="315"
            src=""
            id="rickroll"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>


    <button class="button">Secret Sidequest...</button>

    <script>
        const button = document.querySelector(".button");
        const videoContainer = document.getElementById("videoContainer");
        const rickroll = document.getElementById("rickroll");

        button.addEventListener("click", (e) => {
            e.preventDefault();
            button.classList.add("animate");

            // Show video
            videoContainer.style.display = "block";

            // Load video with autoplay
            rickroll.src = "https://player.vimeo.com/video/877222359?autoplay=1";

            setTimeout(() =>{
            button.classList.remove("animate");
            }, 600); // 1s = 1000ms 
        });
    </script>
</body>


</html>
