<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Secret Sidequest</title>
    <link rel="stylesheet" href="style.css">
 
</head>
<body>

    <button class="button" id="startBtn">Secret Sidequest...</button>

    <div id="videoContainer">
        <h2 id="prankText">Get Pranked! 😂</h2>
        
        <div class="video-wrapper">
            <button id="unmuteOverlay">
                <h3 style="margin-bottom: 5px;">Click here to see the quest</h3>
            </button>

            <iframe 
                id="rickroll"
                src="" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById("startBtn");
        const unmuteOverlay = document.getElementById("unmuteOverlay");
        const videoContainer = document.getElementById("videoContainer");
        const prankText = document.getElementById("prankText");
        const rickroll = document.getElementById("rickroll");

        startBtn.addEventListener("click", () => {
            startBtn.style.display = "none";
            videoContainer.style.display = "block";

            rickroll.src = "https://player.vimeo.com/video/877222359?autoplay=1&muted=1";
        });


        unmuteOverlay.addEventListener("click", () => {

            rickroll.src = "https://player.vimeo.com/video/877222359?autoplay=1&muted=0";
            

            prankText.style.display = "block";
            

            unmuteOverlay.style.opacity = "0";
            setTimeout(() => {
                unmuteOverlay.style.display = "none";
            }, 600);
        });
    </script>
</body>
</html>
